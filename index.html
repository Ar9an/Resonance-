<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LP Personalizer – Troopod</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrapper">
    <div class="header">
      <h1>LP Personalizer</h1>
      <p>Paste your ad + landing page → get a personalized version instantly</p>
    </div>

    <div class="card">
      <label>Ad Creative</label>
      <textarea id="ad-input" rows="4"></textarea>
    </div>

    <div class="card">
      <label>Landing Page Copy</label>
      <textarea id="lp-input" rows="5"></textarea>
    </div>

    <!-- ✅ NO onclick -->
    <button id="run-btn">Personalize →</button>

    <div id="status" class="hidden">Loading...</div>
    <div id="error" class="hidden"></div>

    <div id="output" class="hidden">
      <div id="analysis"></div>
      <div id="before-frame"></div>
      <div id="after-frame"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
