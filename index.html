<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LP Personalizer – Troopod</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>✨ LP Personalizer</h1>
    <p class="subtitle">Turn ads into high-converting landing pages instantly</p>

    <div class="input-section">
      <textarea id="ad-input" placeholder="Paste your Ad Creative..."></textarea>
      <textarea id="lp-input" placeholder="Paste your Landing Page Copy..."></textarea>
      <button id="run-btn">🚀 Generate Personalized Page</button>
    </div>

    <div id="status" class="status hidden">Generating magic...</div>
    <div id="error" class="error hidden"></div>

    <div id="output" class="hidden">

      <div class="analysis-card">
        <h3>🔍 AI Analysis</h3>
        <p id="analysis"></p>
        <div id="insights" class="chips"></div>
      </div>

      <div class="compare">
        <div class="card">
          <h3>Before</h3>
          <div id="before-frame"></div>
        </div>

        <div class="card highlight">
          <h3>After ✨</h3>
          <div id="after-frame"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
